name: Auto Deploy Docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t cicd-demo .

    - name: Save Docker Image
      run: docker save cicd-demo > cicd-demo.tar

    - name: Copy Image to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "cicd-demo.tar"
        target: "/home/azureuser/"

    - name: Deploy on Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          docker stop cicd-demo || true
          docker rm cicd-demo || true
          docker load < cicd-demo.tar
          docker run -d -p 5000:5000 --name cicd-demo cicd-demoname: Auto Deploy Docker

